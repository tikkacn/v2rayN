name: Sync Upstream Release (v2rayN) + Apply Patches + Trigger Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时检查一次

permissions:
  contents: write
  actions: write

env:
  TZ: Asia/Shanghai
  UPSTREAM_REPO: 2dust/v2rayN
  PATCHED_BRANCH: patched-release
  BUILD_WORKFLOW_FILE: build-windows-selfcontained-patched.yml

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patched-release
        uses: actions/checkout@v4
        with:
          ref: patched-release
          fetch-depth: 0

      - name: Git config
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get upstream latest release tag
        id: upstream
        run: |
          set -euo pipefail
          TAG="$(curl -fsSL -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${UPSTREAM_REPO}/releases/latest" | jq -r .tag_name)"
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Failed to get upstream tag_name."
            exit 1
          fi
          echo "UPSTREAM_TAG=$TAG" >> $GITHUB_ENV
          echo "Upstream latest tag: $TAG"

      - name: Read current synced tag (from patched-release)
        run: |
          set -euo pipefail
          CUR=""
          if [ -f .upstream_release_tag ]; then
            CUR="$(cat .upstream_release_tag | tr -d '\r\n\t ')"
          fi
          echo "CURRENT_TAG=$CUR" >> $GITHUB_ENV
          echo "Current synced tag: $CUR"

      - name: Exit if no update
        run: |
          set -euo pipefail
          if [ "${UPSTREAM_TAG}" = "${CURRENT_TAG}" ]; then
            echo "No upstream update. Exit."
            exit 0
          fi
          echo "Upstream updated: ${CURRENT_TAG} -> ${UPSTREAM_TAG}"

      - name: Backup workflows from master (keep ours)
        uses: actions/checkout@v4
        with:
          ref: master
          path: __wf_master
          fetch-depth: 1

      - name: Add upstream remote & fetch tags
        run: |
          set -euo pipefail
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream --tags --force

      - name: Reset patched-release to upstream tag, then restore our workflows
        run: |
          set -euo pipefail
          git reset --hard "refs/tags/${UPSTREAM_TAG}"

          rm -rf .github/workflows || true
          mkdir -p .github
          cp -av "__wf_master/.github/workflows" ".github/workflows"

      - name: Apply patches (hide promotion + fix SubSettingWindow call)
        run: |
          set -euo pipefail
          python3 - << 'PY'
          import os, re

          def read(p):
            with open(p, "r", encoding="utf-8") as f:
              return f.read()

          def write(p, s):
            with open(p, "w", encoding="utf-8") as f:
              f.write(s)

          def ok(m): print("[OK]", m)
          def warn(m): print("[WARN]", m)

          # Patch 1: hide promotion in Avalonia Desktop window
          p1 = "v2rayN/v2rayN.Desktop/Views/MainWindow.axaml.cs"
          if os.path.exists(p1):
            s = read(p1)
            orig = s

            # 方案：把 menuPromotion.Click += MenuPromotion_Click; 替换为隐藏控件 try/catch
            block = (
              "            // 不再绑定推广按钮的点击事件，改为隐藏控件\n"
              "            try\n"
              "            {\n"
              "                menuPromotion.IsVisible = false;\n"
              "            }\n"
              "            catch\n"
              "            {\n"
              "                // 忽略不存在或其他错误\n"
              "            }"
            )
            s2, n = re.subn(
              r"^\s*menuPromotion\.Click\s*\+=\s*MenuPromotion_Click\s*;\s*$",
              block,
              s,
              flags=re.M
            )
            if n == 0 and "menuPromotion.IsVisible = false" not in s:
              # 兜底：找 menuCheckUpdate.Click += ... 前插入
              s2, n2 = re.subn(
                r"(\n\s*menuCheckUpdate\.Click\s*\+=\s*MenuCheckUpdate_Click;\s*)",
                "\n" + block + r"\1",
                s,
                count=1
              )
              if n2 == 0:
                warn(f"Patch1: cannot find insertion point in {p1} (skip)")
                s2 = s
            if s2 != orig:
              write(p1, s2)
              ok(f"Patched: {p1}")
            else:
              warn(f"No change needed: {p1}")
          else:
            warn(f"Not found: {p1}")

          # Patch 2: fix SubSettingWindow ctor call
          p2 = "v2rayN/v2rayN/Views/MainWindow.xaml.cs"
          if os.path.exists(p2):
            s = read(p2)
            orig = s
            s = s.replace(
              "return new SubSettingWindow((SubItem)obj).ShowDialog() ?? false;",
              "return new SubSettingWindow().ShowDialog() ?? false;"
            )
            if s != orig:
              write(p2, s)
              ok(f"Patched: {p2}")
            else:
              warn(f"No change needed: {p2}")
          else:
            warn(f"Not found: {p2}")
          PY

      - name: Record synced tag
        run: |
          set -euo pipefail
          echo "${UPSTREAM_TAG}" > .upstream_release_tag

      - name: Commit changes
        run: |
          set -euo pipefail
          git add -A
          git commit -m "Sync upstream release ${UPSTREAM_TAG} + apply patches" || true

      - name: Push patched-release
        run: |
          set -euo pipefail
          git push origin HEAD:${PATCHED_BRANCH} --force-with-lease

      - name: Trigger build workflow (only when updated)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${BUILD_WORKFLOW_FILE}/dispatches" \
            -d "{\"ref\":\"master\",\"inputs\":{\"upstream_tag\":\"${UPSTREAM_TAG}\",\"publish_release\":\"true\"}}" >/dev/null
          echo "Build workflow dispatched."
