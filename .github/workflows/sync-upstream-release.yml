name: Sync Upstream Release (apply UI patches)

on:
  workflow_dispatch:
  schedule:
    # 每6小时检查一次上游是否发了新 Release；没更新就快速退出
    - cron: "0 */6 * * *"

permissions:
  contents: write
  actions: write

env:
  TZ: Asia/Shanghai

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout patched-release
        uses: actions/checkout@v4
        with:
          ref: patched-release
          fetch-depth: 0

      - name: Git config
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read upstream latest release tag
        id: upstream
        run: |
          set -euo pipefail
          TAG=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/2dust/v2rayN/releases/latest \
            | jq -r .tag_name)

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Failed to get upstream tag_name."
            exit 1
          fi

          echo "UPSTREAM_TAG=$TAG" >> $GITHUB_ENV
          echo "Upstream latest tag: $TAG"

      - name: Read current synced tag (from patched-release)
        id: current
        run: |
          set -euo pipefail
          CUR=""
          if [ -f .upstream_release_tag ]; then
            CUR=$(cat .upstream_release_tag | tr -d '\r\n\t ')
          fi
          echo "CURRENT_TAG=$CUR" >> $GITHUB_ENV
          echo "Current synced tag: $CUR"

      - name: Exit if no update
        run: |
          set -euo pipefail
          if [ "${UPSTREAM_TAG}" = "${CURRENT_TAG}" ]; then
            echo "No upstream update. Exit."
            exit 0
          fi
          echo "Upstream updated: ${CURRENT_TAG} -> ${UPSTREAM_TAG}"

      - name: Backup workflows (keep ours)
        run: |
          set -euo pipefail
          mkdir -p /tmp/keep_workflows
          if [ -d .github/workflows ]; then
            tar -czf /tmp/keep_workflows/workflows.tgz .github/workflows
            echo "Backed up .github/workflows"
          else
            echo "No .github/workflows to backup"
          fi

      - name: Add upstream remote & fetch tags
        run: |
          set -euo pipefail
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/2dust/v2rayN.git
          git fetch upstream --tags --force
          git fetch upstream --prune --force

      - name: Sync upstream tag -> patched-release (hard reset), then restore workflows
        run: |
          set -euo pipefail
          git reset --hard "refs/tags/${UPSTREAM_TAG}"

          # 还原我们自己的 workflows（避免被上游覆盖/删除，且避免 push workflow 权限坑）
          if [ -f /tmp/keep_workflows/workflows.tgz ]; then
            rm -rf .github/workflows || true
            tar -xzf /tmp/keep_workflows/workflows.tgz
            echo "Restored .github/workflows"
          fi

      - name: Apply UI patches (hide promotion + fix SubSettingWindow ctor)
        run: |
          set -euo pipefail
          python3 - << 'PY'
          import os, re, sys

          def read(path):
            with open(path, "r", encoding="utf-8") as f:
              return f.read()

          def write(path, s):
            os.makedirs(os.path.dirname(path), exist_ok=True)
            with open(path, "w", encoding="utf-8") as f:
              f.write(s)

          def ok(msg): print("[OK]", msg)
          def warn(msg): print("[WARN]", msg)

          changed_any = False

          # ---------------- Patch A: hide menuPromotion (Avalonia UI) ----------------
          # 你的截图对应：v2rayN/v2rayN.Desktop/Views/MainWindow.axaml.cs
          p1 = "v2rayN/v2rayN.Desktop/Views/MainWindow.axaml.cs"
          if os.path.exists(p1):
            s = read(p1)
            orig = s

            # 1) 删除/注释掉 Click 事件绑定：menuPromotion.Click += MenuPromotion_Click;
            s = re.sub(
              r'^\s*menuPromotion\.Click\s*\+=\s*MenuPromotion_Click\s*;\s*$',
              '            // menuPromotion.Click += MenuPromotion_Click; // patched: disable promotion',
              s,
              flags=re.M
            )

            # 2) 在构造函数里（menuSettingsSetUWP.Click 之后）插入隐藏逻辑（如果不存在）
            if "menuPromotion.IsVisible = false" not in s:
              anchor = "menuSettingsSetUWP.Click += MenuSettingsSetUWP_Click;"
              idx = s.find(anchor)
              if idx != -1:
                insert_at = idx + len(anchor)
                insert = (
                  "\n\n            // patched: hide promotion menu item\n"
                  "            try\n"
                  "            {\n"
                  "                menuPromotion.IsVisible = false;\n"
                  "            }\n"
                  "            catch\n"
                  "            {\n"
                  "                // ignore\n"
                  "            }\n"
                )
                s = s[:insert_at] + insert + s[insert_at:]
              else:
                warn(f"Anchor not found for inserting hide block in {p1}, skip insert")

            if s != orig:
              write(p1, s)
              ok(f"Patched promotion menu in {p1}")
              changed_any = True
            else:
              warn(f"No changes applied in {p1} (maybe already patched)")
          else:
            warn(f"File not found: {p1}")

          # ---------------- Patch B: fix SubSettingWindow ctor call ----------------
          # 你的截图对应：v2rayN/v2rayN/Views/MainWindow.xaml.cs
          p2 = "v2rayN/v2rayN/Views/MainWindow.xaml.cs"
          if os.path.exists(p2):
            s = read(p2)
            orig = s

            # 把：new SubSettingWindow((SubItem)obj).ShowDialog() ?? false;
            # 改成：new SubSettingWindow().ShowDialog() ?? false;
            s2, n = re.subn(
              r'return\s+new\s+SubSettingWindow\s*\(\s*\(\s*SubItem\s*\)\s*obj\s*\)\s*\.ShowDialog\(\)\s*\?\?\s*false\s*;',
              'return new SubSettingWindow().ShowDialog() ?? false;',
              s
            )
            if n == 0:
              # 兼容另一种写法：new SubSettingWindow((SubItem)obj)?.ShowDialog() ?? false;
              s2, n = re.subn(
                r'return\s+new\s+SubSettingWindow\s*\(\s*\(\s*SubItem\s*\)\s*obj\s*\)\s*\.ShowDialog\(\)\s*\?\?\s*false\s*;',
                'return new SubSettingWindow().ShowDialog() ?? false;',
                s
              )
            s = s2

            if s != orig:
              write(p2, s)
              ok(f"Patched SubSettingWindow ctor in {p2}")
              changed_any = True
            else:
              warn(f"No changes applied in {p2} (maybe already patched)")
          else:
            warn(f"File not found: {p2}")

          if not changed_any:
            print("[WARN] No patch changes were applied at all.")
          PY

      - name: Record synced tag
        run: |
          set -euo pipefail
          echo "${UPSTREAM_TAG}" > .upstream_release_tag

      - name: Commit changes (if any)
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Sync upstream release ${UPSTREAM_TAG} + apply UI patches"

      - name: Push patched-release
        run: |
          set -euo pipefail
          git push origin HEAD:patched-release --force-with-lease

      - name: Trigger Windows SelfContained build (only when updated)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-windows-selfcontained-patched.yml/dispatches \
            -d "{\"ref\":\"master\",\"inputs\":{\"upstream_tag\":\"${UPSTREAM_TAG}\",\"publish_release\":\"true\"}}" >/dev/null
          echo "Build workflow dispatched."
