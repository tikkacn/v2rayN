name: sync_and_build_windows

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: "手动构建使用的上游版本/分支，例如 v7.22.3、v7.22.4、master"
        required: true
        default: "master"
        type: string
      release_tag:
        description: "要发布的 NoAds tag，例如 v7.22.3-NoAds、v7.22.4-NoAds"
        required: true
        type: string
  schedule:
    - cron: "0 */6 * * *" # 每 6 小时检查一次（UTC）

permissions:
  contents: write

concurrency:
  group: sync-and-build-windows
  cancel-in-progress: true

jobs:
  sync_and_build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure git
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        shell: pwsh
        run: |
          git remote add upstream https://github.com/2dust/v2rayN.git 2>$null
          git fetch upstream --prune --tags
          git fetch origin --prune --tags
          git remote set-head upstream -a

      - name: Detect upstream changes
        id: diff
        if: github.event_name == 'schedule'
        shell: pwsh
        run: |
          $upRef = git symbolic-ref -q refs/remotes/upstream/HEAD
          if (-not $upRef) { Write-Error "Cannot resolve upstream HEAD"; exit 1 }
          $up = $upRef -replace '^refs/remotes/', ''
          $behind = git rev-list --count "HEAD..$up"
          "behind=$behind" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Upstream ahead by $behind commits"

      - name: Exit if no upstream updates
        if: github.event_name == 'schedule' && steps.diff.outputs.behind == '0'
        shell: pwsh
        run: |
          Write-Host "No upstream updates. Exit."
          exit 0

      - name: Merge upstream & push
        if: github.event_name == 'schedule'
        shell: pwsh
        run: |
          $upRef = git symbolic-ref -q refs/remotes/upstream/HEAD
          if (-not $upRef) { Write-Error "Cannot resolve upstream HEAD"; exit 1 }
          $up = $upRef -replace '^refs/remotes/', ''
          git merge --no-edit $up
          git push origin HEAD

      - name: Checkout manual base ref
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $baseRef = "${{ github.event.inputs.base_ref }}"

          if ([string]::IsNullOrWhiteSpace($baseRef)) {
            Write-Error "base_ref is empty."
            exit 1
          }

          Write-Host "Manual base_ref: $baseRef"

          if (git rev-parse --verify --quiet "refs/tags/$baseRef") {
            git checkout --force "refs/tags/$baseRef"
          }
          elseif (git rev-parse --verify --quiet "refs/remotes/upstream/$baseRef") {
            git checkout --force "refs/remotes/upstream/$baseRef"
          }
          elseif (git rev-parse --verify --quiet "refs/remotes/origin/$baseRef") {
            git checkout --force "refs/remotes/origin/$baseRef"
          }
          elseif (git rev-parse --verify --quiet "$baseRef") {
            git checkout --force "$baseRef"
          }
          else {
            Write-Error "Cannot find base_ref: $baseRef"
            exit 1
          }

          git submodule update --init --recursive

      - name: Determine release tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tagName = "${{ github.event.inputs.release_tag }}"
          } else {
            $tagName = "v$(date +'%Y.%m.%d')-NoAds"
          }

          if ([string]::IsNullOrWhiteSpace($tagName)) {
            Write-Error "release tag is empty."
            exit 1
          }

          "tag=$tagName" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Release tag: $tagName"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Apply NoAds self-update source
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $globalFile = "v2rayN\ServiceLib\Global.cs"
          $coreInfoFile = "v2rayN\ServiceLib\Manager\CoreInfoManager.cs"

          if (-not (Test-Path $globalFile)) {
            Write-Error "Global.cs not found: $globalFile"
            exit 1
          }

          if (-not (Test-Path $coreInfoFile)) {
            Write-Error "CoreInfoManager.cs not found: $coreInfoFile"
            exit 1
          }

          $g = Get-Content $globalFile -Raw -Encoding UTF8
          $g = $g -replace '\{ ECoreType\.v2rayN,\s*"2dust/v2rayN"\s*\},', '{ ECoreType.v2rayN, "tikkacn/v2rayN" },'
          Set-Content $globalFile $g -Encoding UTF8

          $c = Get-Content $coreInfoFile -Raw -Encoding UTF8
          $c = $c -replace 'v2rayN-windows-64\.zip', 'v2rayN-windows-64-NoAds.zip'
          Set-Content $coreInfoFile $c -Encoding UTF8

          $gCheck = Get-Content $globalFile -Raw -Encoding UTF8
          $cCheck = Get-Content $coreInfoFile -Raw -Encoding UTF8

          if ($gCheck -notmatch 'tikkacn/v2rayN') {
            Write-Error "Failed to set v2rayN update source to tikkacn/v2rayN."
            exit 1
          }

          if ($cCheck -notmatch 'v2rayN-windows-64-NoAds\.zip') {
            Write-Error "Failed to set v2rayN NoAds download asset name."
            exit 1
          }

          Write-Host "✅ v2rayN self-update source set to tikkacn/v2rayN"
          Write-Host "✅ v2rayN self-update asset set to v2rayN-windows-64-NoAds.zip"

      - name: Locate MainWindow axaml & code-behind
        id: locate_mainwindow
        shell: pwsh
        run: |
          $axaml = Get-ChildItem -Recurse -File -Filter "MainWindow.axaml" |
            Where-Object { $_.FullName -match "v2rayN\.Desktop\\Views\\MainWindow\.axaml$" } |
            Select-Object -First 1
          if (-not $axaml) { Write-Error "MainWindow.axaml not found"; exit 1 }

          $cs = Get-ChildItem -Recurse -File -Filter "MainWindow.axaml.cs" |
            Where-Object { $_.FullName -match "v2rayN\.Desktop\\Views\\MainWindow\.axaml\.cs$" } |
            Select-Object -First 1
          if (-not $cs) { Write-Error "MainWindow.axaml.cs not found"; exit 1 }

          "axaml=$($axaml.FullName)" | Out-File $env:GITHUB_OUTPUT -Append
          "cs=$($cs.FullName)" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Remove Promotion menu item (XAML) + Fix code-behind references
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $axaml = "${{ steps.locate_mainwindow.outputs.axaml }}"
          $cs    = "${{ steps.locate_mainwindow.outputs.cs }}"

          # ----------------------------
          # 1) 删除 XAML 里的 menuPromotion
          # ----------------------------
          $x = Get-Content $axaml -Raw -Encoding UTF8

          $patternLine = '(?m)^\s*<MenuItem\b[^>]*\bx:Name\s*=\s*"menuPromotion"[^>]*/>\s*\r?\n?'
          $x2 = [regex]::Replace($x, $patternLine, '')

          if ($x2 -eq $x) {
            $patternAny = '\s*<MenuItem\b[^>]*\bx:Name\s*=\s*"menuPromotion"[^>]*/>\s*'
            $x2 = [regex]::Replace($x, $patternAny, '')
          }

          if ($x2 -eq $x) {
            Write-Error "menuPromotion not removed from XAML (pattern not matched)."
            exit 1
          }

          Set-Content $axaml $x2 -Encoding UTF8

          $xCheck = Get-Content $axaml -Raw -Encoding UTF8
          if ($xCheck -match 'x:Name\s*=\s*"menuPromotion"') {
            Write-Error "menuPromotion still exists in XAML after edit."
            exit 1
          }

          Write-Host "✅ menuPromotion removed from XAML"

          # --------------------------------------
          # 2) 删除 code-behind 里对 menuPromotion 的引用
          #   重点修复：必须用 (?m) 多行模式，否则 ^ 只能匹配文件开头
          # --------------------------------------
          $c = Get-Content $cs -Raw -Encoding UTF8

          # (a) 先删“包含 menuPromotion 的整行”
          $c2 = [regex]::Replace($c, '(?m)^\s*.*\bmenuPromotion\b.*\r?\n', '')

          # (b) 再兜底：有些写法会分多行（比如先换行再 .Click），把紧邻块也删掉
          #     删除 menuPromotion 开头的 1~6 行连续代码块（足够覆盖绑定/初始化）
          $c2 = [regex]::Replace($c2, '(?ms)^\s*.*\bmenuPromotion\b.*(?:\r?\n\s*.*){0,6}', '')

          if ($c2 -ne $c) {
            Set-Content $cs $c2 -Encoding UTF8
            Write-Host "✅ menuPromotion references removed from code-behind"
          } else {
            Write-Host "ℹ️ No menuPromotion references removed (may not exist or pattern changed)"
          }

          # Guard：只要还出现 menuPromotion 这个标识符就失败（防回归）
          $final = Get-Content $cs -Raw -Encoding UTF8
          if ($final -match '\bmenuPromotion\b') {
            Write-Error "menuPromotion still referenced in MainWindow.axaml.cs after cleanup."
            exit 1
          }

      - name: Locate v2rayN.Desktop.csproj
        id: locate_csproj
        shell: pwsh
        run: |
          $csproj = Get-ChildItem -Recurse -File -Filter "v2rayN.Desktop.csproj" | Select-Object -First 1
          if (-not $csproj) { Write-Error "v2rayN.Desktop.csproj not found"; exit 1 }
          "csproj=$($csproj.FullName)" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Restore
        shell: pwsh
        run: dotnet restore "${{ steps.locate_csproj.outputs.csproj }}"

      - name: Publish (win-x64, self-contained)
        shell: pwsh
        run: |
          dotnet publish "${{ steps.locate_csproj.outputs.csproj }}" `
            -c Release `
            -r win-x64 `
            -p:SelfContained=true `
            -o publish

      - name: Check release tag
        shell: pwsh
        run: |
          $tagName = "${{ steps.release_tag.outputs.tag }}"

          if (git ls-remote --tags origin "refs/tags/$tagName" | Select-String $tagName) {
            Write-Error "Remote tag already exists: $tagName"
            exit 1
          }

          Write-Host "Release tag is available: $tagName"

      - name: Zip artifact
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item dist -Recurse -Force }
          New-Item dist -ItemType Directory -Force | Out-Null
          Compress-Archive -Path publish\* -DestinationPath dist\v2rayN-windows-64-NoAds.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v2rayN-windows-64-NoAds.zip
          path: dist/v2rayN-windows-64-NoAds.zip

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          file: dist/v2rayN-windows-64-NoAds.zip
          tag: ${{ steps.release_tag.outputs.tag }}
          file_glob: true
          prerelease: true

      - name: Post Checkout
        run: git clean -fdx
